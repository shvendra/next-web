import Image from 'next/image';

const Logo = () => {
  return (
    <Link href="/" className="flex items-center">
      {/* 1. Original Logo (for Light Mode) */}
      <Image
        src="/images/logo/logo.png" // The blue logo
        alt="BookMyWorker Logo"
        width={160} // Keep existing dimensions
        height={50}
        quality={100}
        priority
        className="h-[50px] w-auto object-contain dark:hidden" // Hiddden in dark mode
      />

      {/* 2. White Logo (for Dark Mode) */}
      <Image
        src="/images/logo/logo-white.png" // Save the generated image as logo-white.png
        alt="BookMyWorker Logo"
        width={160} // Keep same dimensions
        height={50}
        quality={100}
        priority
        className="h-[50px] w-auto object-contain hidden dark:block" // Hidden in light mode, shown in dark
      />
    </Link>
  );
};